sonar.projectKey=ptg-oil-system
sonar.projectName=PTG Oil System

# فقط کد منبع اسکن شود
sonar.sources=src
sonar.tests=tests

# خروجی build، کپی‌های publish، ابزارها و محیط‌ها اسکن نشوند
sonar.exclusions=\
  **/bin/**,\
  **/obj/**,\
  artifacts/**,\
  **/artifacts/**,\
  .venv/**,\
  docs/**,\
  tools/**,\
  node_modules/**,\
  graphify-out/**,\
  .sonarqube/**,\
  sonar-report/**,\
  sonar-report-ptg/**,\
  sonar-claude-mini/**,\
  sonar-claude-compact/**,\
  New folder/**,\
  **/Migrations/**,\
  **/wwwroot/lib/**

# پوشش تست از همان exclusions پیروی کند
sonar.coverage.exclusions=**/Migrations/**,**/wwwroot/**,tests/**

# نکته نیم‌فاصله فارسی (‌): قانون S2479 را در UI پروژه غیرفعال/Wont-Fix کنید — متن فارسی نباید تغییر کند.
