<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Saddiqi Loader Demo</title>
<style>
  :root {
    --bg: #fcfcfc;
    --track: #e8eaed;
    --red: #e2232a;
    --green: #14915d;
    --ink: #252a30;
  }
  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; }
  body {
    background: var(--bg);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow: hidden;
  }
  .stage {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: var(--bg);
  }
  .loader {
    position: relative;
    width: 148px;
    height: 148px;
    transform: translateY(-40px);
    animation: enter .18s cubic-bezier(.2,.8,.2,1) both;
  }
  .ring {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .track {
    fill: none;
    stroke: var(--track);
    stroke-width: 1.4;
  }
  .arc {
    fill: none;
    stroke-linecap: round;
    transform-origin: 74px 74px;
    will-change: transform;
  }
  .arc-red {
    stroke: var(--red);
    stroke-width: 3.1;
    stroke-dasharray: 78 248;
    animation: spin 1.25s linear infinite;
  }
  .arc-red-soft {
    stroke: var(--red);
    stroke-width: 2.2;
    stroke-opacity: .42;
    stroke-dasharray: 34 292;
    transform: rotate(155deg);
    animation: spin 1.65s linear infinite;
  }
  .arc-green {
    stroke: var(--green);
    stroke-width: 3.1;
    stroke-dasharray: 62 203;
    animation: reverse-spin 2.1s linear infinite;
  }
  .arc-green-soft {
    stroke: var(--green);
    stroke-width: 2.1;
    stroke-opacity: .4;
    stroke-dasharray: 29 236;
    transform: rotate(145deg);
    animation: reverse-spin 2.45s linear infinite;
  }
  .halo {
    position: absolute;
    width: 96px;
    height: 96px;
    inset: 26px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(226,35,42,.08), rgba(20,145,93,.035) 48%, transparent 72%);
    filter: blur(8px);
    animation: halo 1.8s ease-in-out infinite;
  }
  .brand {
    position: absolute;
    width: 78px;
    height: 78px;
    left: 35px;
    top: 35px;
    object-fit: contain;
    transform-origin: center;
    filter: drop-shadow(0 8px 14px rgba(37,42,48,.08));
    animation: breathe 1.8s ease-in-out infinite;
    user-select: none;
    pointer-events: none;
  }
  .caption {
    position: absolute;
    top: calc(50% + 74px);
    left: 50%;
    transform: translateX(-50%);
    color: #8a9097;
    font-size: 12px;
    letter-spacing: .04em;
    white-space: nowrap;
    opacity: .72;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes reverse-spin { to { transform: rotate(-360deg); } }
  @keyframes breathe {
    0%, 100% { transform: scale(.985); }
    50% { transform: scale(1.018); }
  }
  @keyframes halo {
    0%, 100% { transform: scale(.95); opacity: .45; }
    50% { transform: scale(1.08); opacity: .8; }
  }
  @keyframes enter {
    from { opacity: 0; transform: translateY(-40px) scale(.965); }
    to { opacity: 1; transform: translateY(-40px) scale(1); }
  }
  @media (max-width: 640px) {
    .loader { width: 128px; height: 128px; transform: translateY(0); }
    .ring { transform: scale(.865); transform-origin: top left; }
    .halo { width: 84px; height: 84px; inset: 22px; }
    .brand { width: 66px; height: 66px; left: 31px; top: 31px; }
    .caption { top: calc(50% + 74px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .arc { animation: none; }
    .brand, .halo { animation-duration: 2.8s; }
  }
</style>
</head>
