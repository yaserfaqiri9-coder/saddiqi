<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Akaunting-inspired UI demo</title>
  <link rel="stylesheet" href="../wwwroot/css/akaunting-inspired.css">
</head>
<body>
<div class="ak-shell" id="appShell">
  <div class="ak-overlay" data-ak-overlay></div>

  <header class="ak-mobile-header">
    <button type="button" data-ak-mobile-toggle aria-label="باز کردن منو">☰</button>
    <strong>PTG Oil System</strong>
    <span></span>
  </header>

  <aside class="ak-sidebar" data-ak-sidebar aria-label="منوی اصلی">
    <div class="ak-rail ak-menu-scroll">
      <div class="ak-rail-group">
        <button class="ak-rail-button" type="button" title="پروفایل" aria-label="پروفایل">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
        </button>
        <button class="ak-rail-button" type="button" title="اعلان‌ها" aria-label="اعلان‌ها">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M10 21h4"/></svg>
        </button>
        <button class="ak-rail-button" type="button" title="جستجوی عمومی" aria-label="جستجوی عمومی">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
        </button>
        <button class="ak-rail-button" type="button" title="ایجاد جدید" aria-label="ایجاد جدید">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
        </button>
        <button class="ak-rail-button" type="button" title="تنظیمات" aria-label="تنظیمات">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9 7 7M17 17l2.1 2.1M19.1 4.9 17 7M7 17l-2.1 2.1"/></svg>
        </button>
      </div>
    </div>

    <nav class="ak-main-menu ak-menu-scroll">
      <button class="ak-company" type="button">
        <span class="ak-company-mark">P</span>
        <span class="ak-company-name">PTG Oil System</span>
        <svg class="ak-company-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m8 9 4-4 4 4M16 15l-4 4-4-4"/></svg>
      </button>

      <ul class="ak-menu">
        <li class="ak-menu-item">
          <a class="ak-menu-link" href="#">
            <span class="ak-menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
            <span class="ak-menu-label">داشبورد</span>
            <span class="ak-menu-active-rail"></span>
          </a>
        </li>

        <li class="ak-menu-item">
          <details class="ak-menu-details">
            <summary class="ak-menu-summary" aria-expanded="false">
              <span class="ak-menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 3h14v18H5zM8 7h8M8 11h8M8 15h5"/></svg></span>
              <span class="ak-menu-label">قراردادها</span>
              <svg class="ak-menu-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m7 10 5 5 5-5"/></svg>
            </summary>
            <div class="ak-submenu-wrap">
              <ul class="ak-submenu">
                <li class="ak-submenu-item"><a class="ak-submenu-link" href="#">همه قراردادها</a></li>
                <li class="ak-submenu-item"><a class="ak-submenu-link" href="#">قراردادهای خرید</a></li>
                <li class="ak-submenu-item"><a class="ak-submenu-link" href="#">قراردادهای فروش</a></li>
                <li class="ak-submenu-item"><a class="ak-submenu-link" href="#">اصلاحیه‌ها</a></li>
              </ul>
            </div>
          </details>
        </li>

        <li class="ak-menu-item">
          <details class="ak-menu-details">
            <summary class="ak-menu-summary" aria-expanded="false">
              <span class="ak-menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h11v10H3zM14 9h4l3 3v4h-7z"/><circle cx="7" cy="18" r="2"/><circle cx="18" cy="18" r="2"/></svg></span>
              <span class="ak-menu-label">لجستیک</span>
              <svg class="ak-menu-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m7 10 5 5 5-5"/></svg>
            </summary>
            <div class="ak-submenu-wrap">
              <ul class="ak-submenu">
                <li class="ak-submenu-item"><a class="ak-submenu-link" href="#">بارگیری‌ها</a></li>
                <li class="ak-submenu-item"><a class="ak-submenu-link" href="#">تخلیه‌ها</a></li>
                <li class="ak-submenu-item"><a class="ak-submenu-link" href="#">اعزام‌ها</a></li>
              </ul>
            </div>
          </details>
        </li>

        <li class="ak-menu-item">
          <a class="ak-menu-link is-active" href="#">
            <span class="ak-menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2"/><path d="M3 20a6 6 0 0 1 12 0M14 16a5 5 0 0 1 7 4"/></svg></span>
            <span class="ak-menu-label">مشتریان</span>
            <span class="ak-menu-active-rail"></span>
          </a>
        </li>

        <li class="ak-menu-item">
          <a class="ak-menu-link" href="#">
            <span class="ak-menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg></span>
            <span class="ak-menu-label">گزارش‌ها</span>
            <span class="ak-menu-active-rail"></span>
          </a>
        </li>
      </ul>
    </nav>
    <button class="ak-menu-toggle" type="button" data-ak-sidebar-toggle aria-label="بستن منو" aria-expanded="true">‹</button>
  </aside>

  <main class="ak-content">
    <div class="ak-page">
      <header class="ak-page-head">
        <h1 class="ak-page-title">مشتریان</h1>
        <button class="ak-primary" type="button">مشتری جدید</button>
      </header>

      <section class="ak-kpis">
        <div class="ak-kpi"><div class="ak-kpi-label">همه مشتریان</div><div class="ak-kpi-value" id="allCount">8</div></div>
        <div class="ak-kpi"><div class="ak-kpi-label">فعال</div><div class="ak-kpi-value" id="activeCount">6</div></div>
        <div class="ak-kpi"><div class="ak-kpi-label">مانده باز</div><div class="ak-kpi-value">$ 42,750</div></div>
      </section>

      <div class="ak-filter-host">
        <div class="ak-filter" id="customerFilter" data-ak-filter>
          <div class="ak-filter-chips" data-ak-filter-chips aria-live="polite"></div>
          <div class="ak-filter-input-wrap">
            <input class="ak-filter-input" type="search" autocomplete="off"
                   data-ak-filter-input placeholder="جستجو یا فیلتر نتایج..."
                   aria-label="جستجو یا فیلتر نتایج">
            <button class="ak-filter-enter" type="button" data-ak-filter-enter disabled>Enter</button>
          </div>
          <button class="ak-filter-clear" type="button" data-ak-filter-clear hidden aria-label="پاک‌کردن فیلترها">×</button>
          <ul class="ak-filter-popover" data-ak-filter-popover role="listbox" hidden></ul>
        </div>
      </div>

      <div class="ak-table-card">
        <table class="ak-table">
          <thead>
            <tr><th>نام مشتری</th><th>کشور</th><th>وضعیت</th><th>مانده</th><th>تاریخ ایجاد</th></tr>
          </thead>
          <tbody id="customerRows"></tbody>
        </table>
      </div>
      <p id="debugQuery" style="direction:ltr;text-align:left;color:#7b7b7b;margin-top:14px;font-family:monospace"></p>
    </div>
  </main>
</div>

<script src="../wwwroot/js/akaunting-filter.js"></script>
<script>
const customers = [
  {name:"Volga Trade", email:"office@volga.test", country:"RU", countryLabel:"روسیه", status:"active", balance:12400, created:"2026-01-11"},
  {name:"Solvex BNK", email:"finance@solvex.test", country:"TM", countryLabel:"ترکمنستان", status:"active", balance:8750, created:"2026-02-08"},
  {name:"Ilinka Terminal", email:"ops@ilinka.test", country:"RU", countryLabel:"روسیه", status:"active", balance:0, created:"2026-02-19"},
  {name:"Ariana Fuel", email:"sales@ariana.test", country:"AF", countryLabel:"افغانستان", status:"inactive", balance:3200, created:"2026-03-04"},
  {name:"Herat Logistics", email:"info@heratlog.test", country:"AF", countryLabel:"افغانستان", status:"active", balance:4500, created:"2026-04-14"},
  {name:"Caspian Energy", email:"hello@caspian.test", country:"KZ", countryLabel:"قزاقستان", status:"active", balance:10900, created:"2026-05-02"},
  {name:"North Star Oil", email:"accounts@northstar.test", country:"RU", countryLabel:"روسیه", status:"inactive", balance:3000, created:"2026-05-22"},
  {name:"PTG Retail", email:"retail@ptg.test", country:"AF", countryLabel:"افغانستان", status:"active", balance:0, created:"2026-06-10"}
];

const rows = document.getElementById("customerRows");
const debug = document.getElementById("debugQuery");

function renderCustomers(payload = {text:"", tokens:[]}) {
  let result = customers.slice();
  const text = (payload.text || "").toLocaleLowerCase();
  if (text) result = result.filter(x =>
    x.name.toLocaleLowerCase().includes(text) ||
    x.email.toLocaleLowerCase().includes(text)
  );

  for (const token of payload.tokens || []) {
    const values = Array.isArray(token.value) ? token.value.map(String) : [String(token.value)];
    if (token.fieldKey === "status") {
      if (token.operator === "neq") result = result.filter(x => !values.includes(x.status));
      else result = result.filter(x => values.includes(x.status));
    }
    if (token.fieldKey === "country") {
      if (token.operator === "neq") result = result.filter(x => !values.includes(x.country));
      else result = result.filter(x => values.includes(x.country));
    }
    if (token.fieldKey === "created_at") {
      if (token.operator === "between") {
        result = result.filter(x => x.created >= token.value[0] && x.created <= token.value[1]);
      } else if (token.operator === "neq") {
        result = result.filter(x => x.created !== token.value);
      } else result = result.filter(x => x.created === token.value);
    }
    if (token.fieldKey === "balance") {
      const amount = Number(token.value);
      if (token.operator === "neq") result = result.filter(x => x.balance !== amount);
      else result = result.filter(x => x.balance === amount);
    }
  }

  rows.innerHTML = result.length ? result.map(x => `
    <tr>
      <td><div class="ak-name-cell"><span class="ak-avatar">${x.name[0]}</span><div><strong>${x.name}</strong><div style="color:#7b7b7b;font-size:12px">${x.email}</div></div></div></td>
      <td>${x.countryLabel}</td>
      <td><span class="ak-badge">${x.status === "active" ? "فعال" : "غیرفعال"}</span></td>
      <td style="direction:ltr;text-align:right">$ ${x.balance.toLocaleString()}</td>
      <td style="direction:ltr">${x.created}</td>
    </tr>`).join("") : `<tr><td class="ak-empty" colspan="5">نتیجه‌ای پیدا نشد.</td></tr>`;

  document.getElementById("allCount").textContent = result.length;
  document.getElementById("activeCount").textContent = result.filter(x => x.status === "active").length;
  debug.textContent = payload.queryString ? `Query: ${payload.queryString}` : "";
}

new AkSidebar(document.getElementById("appShell"));

const filter = new AkFilterBar(document.getElementById("customerFilter"), {
  fields: [
    {
      key: "status", label: "وضعیت", type: "select", icon: "●",
      operators: ["eq", "neq", "in"], multiple: true,
      values: [
        {key: "active", label: "فعال"},
        {key: "inactive", label: "غیرفعال"}
      ]
    },
    {
      key: "country", label: "کشور", type: "select", icon: "⌖",
      operators: ["eq", "neq", "in"], multiple: true,
      values: [
        {key: "AF", label: "افغانستان"},
        {key: "RU", label: "روسیه"},
        {key: "TM", label: "ترکمنستان"},
        {key: "KZ", label: "قزاقستان"}
      ]
    },
    {
      key: "created_at", label: "تاریخ ایجاد", type: "date", icon: "▣",
      operators: ["eq", "neq", "between"]
    },
    {
      key: "balance", label: "مانده", type: "number", icon: "$",
      operators: ["eq", "neq"],
      allowCustom: true,
      values: [
        {key: "0", label: "بدون مانده"},
        {key: "3000", label: "3,000"},
        {key: "4500", label: "4,500"},
        {key: "8750", label: "8,750"}
      ]
    }
  ],
  onApply: renderCustomers
});

renderCustomers({text: filter.input.value, tokens: filter.tokens, queryString: filter.serialize()});
</script>
</body>
</html>
